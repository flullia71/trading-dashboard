name: Scheduled Trading Scan

on:
  schedule:
    - cron: '30 8 * * 1-5'
    - cron: '30 14 * * 1-5'
  workflow_dispatch: 

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Aggiornato

      - name: Set up Python
        uses: actions/setup-python@v5 # Aggiornato
        with:
          python-version: '3.10' # Versione più moderna

      - name: Install dependencies
        run: |
          pip install yfinance pandas gspread google-auth requests

      - name: Run Scan
        env:
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scanner_automatico.py
